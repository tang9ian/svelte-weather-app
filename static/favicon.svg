<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#74b9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0984e3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cloudGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="url(#skyGradient)"/>
  
  <!-- Sun -->
  <circle cx="22" cy="10" r="4" fill="#ffeb3b" opacity="0.9"/>
  <g stroke="#ffeb3b" stroke-width="1" opacity="0.7">
    <line x1="22" y1="3" x2="22" y2="5"/>
    <line x1="22" y1="15" x2="22" y2="17"/>
    <line x1="15" y1="10" x2="17" y2="10"/>
    <line x1="27" y1="10" x2="29" y2="10"/>
    <line x1="17.5" y1="5.5" x2="18.8" y2="6.8"/>
    <line x1="25.2" y1="13.2" x2="26.5" y2="14.5"/>
    <line x1="26.5" y1="5.5" x2="25.2" y2="6.8"/>
    <line x1="18.8" y1="13.2" x2="17.5" y2="14.5"/>
  </g>
  
  <!-- Cloud -->
  <g fill="url(#cloudGradient)">
    <circle cx="12" cy="20" r="4"/>
    <circle cx="8" cy="18" r="3"/>
    <circle cx="16" cy="18" r="3"/>
    <circle cx="10" cy="16" r="2.5"/>
    <circle cx="14" cy="16" r="2.5"/>
  </g>
  
  <!-- Rain drops -->
  <g fill="#4fc3f7" opacity="0.8">
    <ellipse cx="8" cy="25" rx="0.8" ry="1.5"/>
    <ellipse cx="12" cy="27" rx="0.8" ry="1.5"/>
    <ellipse cx="16" cy="25" rx="0.8" ry="1.5"/>
  </g>
</svg>
